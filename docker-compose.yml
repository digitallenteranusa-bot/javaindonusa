services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javaindonusa-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - javaindonusa

  mysql:
    image: mysql:8.0
    container_name: javaindonusa-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-javaindonusa}
      MYSQL_USER: ${DB_USERNAME:-javaindonusa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - javaindonusa

  redis:
    image: redis:7-alpine
    container_name: javaindonusa-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - javaindonusa

  node:
    image: node:20-alpine
    container_name: javaindonusa-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "${VITE_PORT:-5173}:5173"
    profiles:
      - dev
    networks:
      - javaindonusa

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: javaindonusa-pma
    restart: unless-stopped
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-javaindonusa}
      PMA_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - javaindonusa

volumes:
  mysql-data:
  redis-data:

networks:
  javaindonusa:
    driver: bridge
